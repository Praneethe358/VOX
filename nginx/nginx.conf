server {
    listen 80;
    server_name localhost;

    # ─── Gzip ────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ─── Security Headers ────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' http://localhost:3000 http://localhost:4000; media-src 'self' blob:; object-src 'none'; frame-ancestors 'self';" always;
    # Enable HSTS when using HTTPS (uncomment when TLS is configured)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Global request size limit ───────────────────────────────────────
    client_max_body_size 10M;

    # ─── Rate limiting zones ─────────────────────────────────────────────
    # Defined in http{} block; applied per-location below

    # ─── API Reverse Proxy ───────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed later)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for long-running AI requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Override for file uploads (PDF, audio)
        client_max_body_size 50M;

        # Hide backend server header
        proxy_hide_header X-Powered-By;
    }

    # ─── Health endpoint proxy ───────────────────────────────────────────
    location /health {
        proxy_pass http://backend:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ─── Face-api.js Model Files (with caching) ─────────────────────────
    location /models/ {
        alias /usr/share/nginx/html/models/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Static Frontend (SPA fallback) ──────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
